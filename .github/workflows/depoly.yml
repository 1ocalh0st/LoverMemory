name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies and Build
        run: |
          npm install
          npm run build

      # 新增步骤：将当前电脑的公钥添加到服务器白名单
      - name: Add local PC public key to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ~/.ssh
            chmod 700 ~/.ssh
            # 检查公钥是否已存在，不存在则追加
            if ! grep -q "administrator@DESKTOP-3H5B1U2" ~/.ssh/authorized_keys; then
              echo "ssh-rsa  administrator@DESKTOP-3H5B1U2" >> ~/.ssh/authorized_keys
              chmod 600 ~/.ssh/authorized_keys
              echo "Public key added successfully!"
            else
              echo "Public key already exists."
            fi

      - name: Deploy to Server
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-avzr --delete"
          SOURCE: "apps/web/dist/"
          REMOTE_HOST: ${{ secrets.SERVER_IP }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          TARGET: "/var/www/LoverMemory/dist"

      - name: Refresh Running Web Container
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            WEB_CONTAINER=$(docker ps --filter "label=com.docker.compose.service=web" --format '{{.Names}}' | head -n 1)
            if [ -z "$WEB_CONTAINER" ]; then
              echo "web container not found"
              exit 1
            fi
            docker exec "$WEB_CONTAINER" sh -lc 'rm -rf /usr/share/nginx/html/assets /usr/share/nginx/html/pictures /usr/share/nginx/html/favicon.svg /usr/share/nginx/html/icons.svg /usr/share/nginx/html/index.html /usr/share/nginx/html/manifest.webmanifest /usr/share/nginx/html/sw.js /usr/share/nginx/html/workbox-*.js'
            docker cp /var/www/LoverMemory/dist/. "$WEB_CONTAINER":/usr/share/nginx/html/
            docker exec "$WEB_CONTAINER" sh -lc 'stat /usr/share/nginx/html/index.html && sed -n "1,12p" /usr/share/nginx/html/index.html'
