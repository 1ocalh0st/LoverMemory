services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      APP_URL: http://localhost:8080
      API_URL: http://api:3000
      APP_NAME: LoverMemory
      APP_SECRET: ${APP_SECRET:-change-me}
      RP_ID: localhost
      RP_ORIGIN: http://localhost:8080
      DATABASE_URL: mysql://lovermemory:lovermemory@mysql:3306/lovermemory
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://localhost:9000
      S3_INTERNAL_ENDPOINT: http://minio:9000
      S3_REGION: auto
      S3_BUCKET: lovermemory
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_FORCE_PATH_STYLE: "true"
      ASSET_BASE_URL: http://localhost:9000/lovermemory
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:hello@example.com}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
    depends_on:
      - mysql
      - redis
      - minio

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://lovermemory:lovermemory@mysql:3306/lovermemory
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://localhost:9000
      S3_INTERNAL_ENDPOINT: http://minio:9000
      S3_REGION: auto
      S3_BUCKET: lovermemory
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_FORCE_PATH_STYLE: "true"
      ASSET_BASE_URL: http://localhost:9000/lovermemory
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:hello@example.com}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
    depends_on:
      - mysql
      - redis
      - minio

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: lovermemory
      MYSQL_USER: lovermemory
      MYSQL_PASSWORD: lovermemory
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-03-12T17-29-24Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin &&
      /usr/bin/mc mb -p local/lovermemory || true
      "

volumes:
  mysql-data:
  minio-data:
